<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  text-decoration: none;
  color: #666;
  -webkit-tap-highlight-color: transparent;
}

html {
  font-size: 48px;
  overflow-y: hidden;
}

.splash-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}

.splash-video video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

.skip-btn {
  position: absolute;
  right: 0.3rem;
  top: 0.3rem;
  padding: 0.12rem 0.24rem;
  background: rgba(80, 80, 80, 0.65);
  color: #fff;
  border-radius: 0.3rem;
  font-size: 0.18rem;
  cursor: pointer;
  z-index: 10000;
  backdrop-filter: blur(2px);
}

.background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 20%;
  background: url('https://ali2.a.kwimgs.com/ufile/atlas/NTE5MTgwNjA4NDM2NTQwMDYzM18xNzIzMTgyMTEwMzA5_1.jpg') center/cover no-repeat;
  animation: backgroundZoom 10s ease-in-out infinite;
  z-index: -1;
}

@keyframes backgroundZoom {
  0%, 100% { background-size: 100%; }
  50% { background-size: 120%; }
}

.inter_nav {
  position: relative;
  z-index: 10;
  margin-top: 15vh;
  padding: 5px 0.2rem;
  background: #fff;
  border-radius: 0.2rem 0.2rem 0 0;
  box-shadow: 0 0.05rem 0.1rem rgba(0, 0, 0, 0.1);
}

.inter_nav ul {
  display: flex;
  list-style: none;
  overflow-x: auto;
  padding: 0.3rem 0;
  white-space: nowrap;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.inter_nav ul::-webkit-scrollbar {
  display: none;
}

.inter_nav li {
  display: flex;
  align-items: center;
  gap: 0.05rem;
  border: 0.02rem solid #efefef;
  border-radius: 0.5rem;
  padding: 0 0.3rem;
  margin-right: 0.2rem;
  line-height: 0.4rem;
  font-size: 0.18rem;
  transition: all 0.2s ease;
  cursor: pointer;
}

.inter_nav li:hover {
  background-color: #f5f5f5;
  transform: translateY(-1px);
}

.inter_nav img {
  width: 0.3rem;
  height: 0.3rem;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid #efefef;
}

iframe {
  position: fixed;
  width: 100%;
  height: 90vh;
  border: none;
}

@media (min-width: 1024px) {
  .background {
    height: 430px;
  }
  .inter_nav {
    margin-top: 420px;
  }
}
</style>
</head>
  <body>
  <div class="splash-video" id="splash">
  <div class="skip-btn" id="skipBtn">跳过</div>
  <video id="splashVideo" playsinline webkit-playsinline x5-video-player-type="h5" x5-video-player-fullscreen="true" preload="auto">
  <source src="splash.mp4" type="video/mp4"></video>
</div>
  <div class="background"></div>
  <div class="inter_nav"><ul>
  <li><img src="Icon.png">
  <a href="">待参加</a></li>
  <li><img src="Icon.png">
  <a href="">待参加</a></li>
  <li><img src="Icon.png">
  <a href="">待参加</a></li>
  <li><img src="Icon.png">
  <a href="">待参加</a></li>
  <li><img src="Icon.png">
  <a href="">待参加</a></li>
  </ul></div>
  <iframe src="https://op.lanzoue.com/s/moduley"></iframe>
<script>
(function(){
const splash=document.getElementById('splash');
const video=document.getElementById('splashVideo');
const skipBtn=document.getElementById('skipBtn');
video.addEventListener('ended',()=>{
splash.style.display='none';
});
skipBtn.addEventListener('click',()=>{
splash.style.display='none';
video.pause();
});
document.addEventListener('DOMContentLoaded',()=>{
video.play();
});
})();
</script>
</body>
</html>
